kind = "web"
previewPath = "/"
title = "Harish — AI Portfolio"
version = "1.0.0"
id = "artifacts/harish-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18843

[services.development]
run = "pnpm --filter @workspace/harish-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/harish-portfolio", "run", "build" ]
publicDir = "artifacts/harish-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18843"
BASE_PATH = "/"
